<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Japan Helper — Redirecting...</title>
  <script>
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script takes the current URL and converts the path and query
    // string into just a query string, and then redirects the browser
    // to the new URL with the query string.
    // For example, if the user goes to:
    //   https://username.github.io/japan-helper/some/path
    // they will be redirected to:
    //   https://username.github.io/japan-helper/?/some/path
    // The 404.html file is redirected to index.html by the browser,
    // which then reads the query string and converts it back into a path.
    var pathSegmentsToKeep = 1; // Keep one segment (the repo name)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
      l.search +
      (l.hash ? '#' + l.hash.slice(1) : '')
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
